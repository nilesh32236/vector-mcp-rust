name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    # 1. Use the highly optimized rust-cache action instead of manual caching
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ubuntu-latest-cargo"

    # 2. Install a faster linker (mold) to significantly reduce linking times
    - name: Install mold linker
      uses: rui314/setup-mold@v1

    - name: Install protoc (required by lance)
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Check Formatting
      run: cargo fmt -- --check

    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    # 3. Removed `--release`. We only build in standard debug mode for CI verification.
    - name: Build
      run: cargo build --verbose

    - name: Run Tests
      run: cargo test --verbose
